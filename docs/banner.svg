    <text x="0" y="62" fill="#FFFFFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="62" font-weight="900">Finance Tracking System</text>
    <text x="0" y="112" fill="#DBEAFE" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="25" font-weight="500">Live markets, risk radar, transactions, and Oracle-ready workflows.</text>
