<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Finance Tracking System banner</title>
  <desc id="desc">Portfolio command center banner with market cards, risk radar, and asset allocation visuals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080B18"/>
      <stop offset="0.5" stop-color="#172554"/>
      <stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <radialGradient id="gold" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(930 80) rotate(138) scale(330 230)">
      <stop stop-color="#FBBF24" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="360" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="34" fill="url(#gold)"/>
  <g opacity="0.18">
